<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>미국주식 시세 설정</title>
  <link rel="stylesheet" href="sdpi.css">
</head>
<body>
  <div id="piRoot"></div>

  <script src="sdpi.js"></script>
  <script src="stock-pi-shared.js"></script>
  <script>
    window.KISStockPI.bootstrap({
      actionTitle: "미국주식 설정",
      fields: [
        {
          id: "ticker",
          label: "티커 심볼",
          placeholder: "AAPL",
          help: "미국주식 티커 심볼을 입력하세요 (예: AAPL, TSLA, MSFT)",
          errorMessage: "1~6자 영문 티커를 입력하세요 (예: AAPL)",
          invalidStatusMessage: "티커는 1~6자 영문이어야 합니다.",
          validate: function (value) {
            return /^[A-Z]{1,6}$/i.test(value);
          },
          normalizeInput: function (value) {
            return value.toUpperCase();
          },
          normalizeReceived: function (value) {
            return value.toUpperCase();
          },
          serialize: function (value) {
            return value.trim().toUpperCase();
          }
        },
        {
          id: "exchange",
          type: "select",
          label: "거래소",
          help: "종목이 상장된 거래소를 선택하세요",
          defaultValue: "NAS",
          options: [
            { value: "NAS", label: "NASDAQ" },
            { value: "NYS", label: "NYSE" },
            { value: "AMS", label: "AMEX" }
          ]
        },
        {
          id: "stockName",
          label: "종목명",
          placeholder: "Apple",
          help: "Stream Deck 키에 표시할 종목명을 입력하세요",
          serialize: function (value) {
            return value.trim();
          }
        }
      ]
    });
  </script>
</body>
</html>
