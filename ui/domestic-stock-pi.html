<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>국내주식 시세 설정</title>
  <link rel="stylesheet" href="sdpi.css">
</head>
<body>
  <div id="piRoot"></div>

  <script src="sdpi.js"></script>
  <script src="stock-pi-shared.js"></script>
  <script>
    window.KISStockPI.bootstrap({
      actionTitle: "국내주식 설정",
      fields: [
        {
          id: "stockCode",
          label: "종목코드",
          placeholder: "005930",
          help: "6자리 종목코드를 입력하세요 (예: 삼성전자 005930)",
          errorMessage: "6자리 숫자를 입력하세요 (예: 005930)",
          invalidStatusMessage: "종목코드는 6자리 숫자여야 합니다.",
          validate: function (value) {
            return /^\d{6}$/.test(value);
          },
          serialize: function (value) {
            return value.trim();
          }
        },
        {
          id: "stockName",
          label: "종목명",
          placeholder: "삼성전자",
          help: "Stream Deck 키에 표시할 종목명을 입력하세요",
          serialize: function (value) {
            return value.trim();
          }
        }
      ]
    });
  </script>
</body>
</html>
