<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>국내주식 시세 설정</title>
  <link rel="stylesheet" href="sdpi.css">
  <style>
    .sdpi-error {
      color: #ff5252;
      font-size: 11px;
      padding: 2px 8px 4px;
      display: none;
    }
    .sdpi-test-result {
      font-size: 12px;
      padding: 4px 8px;
      display: none;
    }
    .sdpi-test-result.success { color: #00c853; }
    .sdpi-test-result.error { color: #ff5252; }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">

    <!-- ─── KIS API 설정 (전역) ─── -->
    <div class="sdpi-group">
      <div class="sdpi-group-label">KIS API 설정 (공통)</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">App Key</div>
        <div class="sdpi-item-value">
          <input type="password" id="appKey" placeholder="App Key 입력">
        </div>
      </div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">App Secret</div>
        <div class="sdpi-item-value">
          <input type="password" id="appSecret" placeholder="App Secret 입력">
        </div>
      </div>

      <div class="sdpi-help">
        한국투자증권 Open API에서 발급받은 키를 입력하세요. 모든 버튼에 공통 적용됩니다.
      </div>

      <!-- 연결 테스트 버튼 -->
      <div class="sdpi-item">
        <div class="sdpi-item-label">연결</div>
        <button id="testConnectionBtn" class="sdpi-item-value">연결 테스트</button>
      </div>
      <div id="testConnectionResult" class="sdpi-test-result"></div>
    </div>

    <div class="sdpi-separator"></div>

    <!-- ─── 국내주식 설정 (액션별) ─── -->
    <div class="sdpi-group">
      <div class="sdpi-group-label">국내주식 설정</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">업데이트</div>
        <div class="sdpi-item-value">
          <select id="updateMode">
            <option value="websocket">실시간 (WebSocket)</option>
            <option value="hybrid">WebSocket + 쓰로틀</option>
            <option value="poll">주기적 (폴링)</option>
          </select>
        </div>
      </div>

      <div id="pollIntervalRow" class="sdpi-item" style="display:none;">
        <div class="sdpi-item-label">간격(초)</div>
        <div class="sdpi-item-value">
          <input type="number" id="pollIntervalSec" min="1" max="3600" placeholder="30">
        </div>
      </div>
      <div id="pollIntervalError" class="sdpi-error">1~3600 사이의 숫자를 입력하세요</div>

      <div id="throttleMsRow" class="sdpi-item" style="display:none;">
        <div class="sdpi-item-label">쓰로틀(ms)</div>
        <div class="sdpi-item-value">
          <input type="number" id="throttleMs" min="200" placeholder="1000">
        </div>
      </div>
      <div id="throttleMsError" class="sdpi-error">최솟값은 200ms입니다</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">종목코드</div>
        <div class="sdpi-item-value">
          <input type="text" id="stockCode" placeholder="005930">
        </div>
      </div>
      <div id="stockCodeError" class="sdpi-error">6자리 숫자를 입력하세요 (예: 005930)</div>
      <div class="sdpi-help">6자리 종목코드를 입력하세요 (예: 삼성전자 005930)</div>

      <div class="sdpi-item">
        <div class="sdpi-item-label">종목명</div>
        <div class="sdpi-item-value">
          <input type="text" id="stockName" placeholder="삼성전자">
        </div>
      </div>
      <div class="sdpi-help">Stream Deck 키에 표시할 종목명을 입력하세요</div>
    </div>

    <!-- 상태 메시지 -->
    <div id="statusMessage" class="sdpi-status info" style="display:none;"></div>

  </div>

  <script src="sdpi.js"></script>
  <script>
    var stockCodeValid = true;

    // ─── 연결 성공 표시 ───
    function showConnectionSuccess(persistent) {
      var resultEl = document.getElementById("testConnectionResult");
      resultEl.textContent = "연결 성공";
      resultEl.className = "sdpi-test-result success";
      resultEl.style.display = "block";
      if (!persistent) {
        setTimeout(function () { resultEl.style.display = "none"; }, 3000);
      }
    }

    // ─── 전역 설정 수신 ───
    document.addEventListener("piDidReceiveGlobalSettings", function (evt) {
      var settings = evt.detail || {};
      document.getElementById("appKey").value = settings.appKey || "";
      document.getElementById("appSecret").value = settings.appSecret || "";

      // 유효한 캐시 토큰이 있으면 연결 성공 상태 자동 표시 (지속)
      var TOKEN_SAFETY_MS = 3600 * 1000; // 1시간 안전 마진
      if (
        settings.accessToken &&
        typeof settings.accessTokenExpiry === "number" &&
        settings.accessTokenExpiry > Date.now() + TOKEN_SAFETY_MS
      ) {
        showConnectionSuccess(true);
      }
    });

    // ─── 액션 설정 수신 ───
    document.addEventListener("piDidReceiveSettings", function (evt) {
      var settings = evt.detail || {};
      var mode = settings.updateMode || "websocket";
      document.getElementById("updateMode").value = mode;
      document.getElementById("pollIntervalSec").value = settings.pollIntervalSec || "30";
      document.getElementById("throttleMs").value = settings.throttleMs || "1000";
      document.getElementById("pollIntervalRow").style.display = mode === "poll" ? "flex" : "none";
      document.getElementById("throttleMsRow").style.display = mode === "hybrid" ? "flex" : "none";
      document.getElementById("stockCode").value = settings.stockCode || "";
      document.getElementById("stockName").value = settings.stockName || "";
      validateStockCode(settings.stockCode || "");
    });

    // ─── 전역 설정 저장 (App Key / App Secret 변경 시) ───
    function saveGlobalSettings() {
      setGlobalSettings({
        appKey: document.getElementById("appKey").value.trim(),
        appSecret: document.getElementById("appSecret").value.trim(),
      });
      showStatus("API 설정이 저장되었습니다", "success");
    }

    document.getElementById("appKey").addEventListener("change", saveGlobalSettings);
    document.getElementById("appSecret").addEventListener("change", saveGlobalSettings);

    // ─── 종목코드 실시간 검증 ───
    function validateStockCode(value) {
      var isValid = /^\d{6}$/.test(value);
      var errorEl = document.getElementById("stockCodeError");
      if (value.length > 0 && !isValid) {
        errorEl.style.display = "block";
        stockCodeValid = false;
      } else {
        errorEl.style.display = "none";
        stockCodeValid = true;
      }
      return isValid || value.length === 0;
    }

    document.getElementById("stockCode").addEventListener("input", function () {
      validateStockCode(this.value);
    });

    // ─── 폴링 간격 유효성 검사 ───
    function validatePollInterval(value) {
      var n = parseInt(value, 10);
      var isValid = !isNaN(n) && n >= 1 && n <= 3600;
      document.getElementById("pollIntervalError").style.display =
        value.length > 0 && !isValid ? "block" : "none";
      return isValid || value.length === 0;
    }

    // ─── 쓰로틀 유효성 검사 ───
    function validateThrottleMs(value) {
      var n = parseInt(value, 10);
      var isValid = !isNaN(n) && n >= 200;
      document.getElementById("throttleMsError").style.display =
        value.length > 0 && !isValid ? "block" : "none";
      return isValid || value.length === 0;
    }

    // ─── 액션 설정 저장 (종목코드 / 종목명 변경 시) ───
    function saveActionSettings() {
      if (!stockCodeValid) return;
      setSettings({
        stockCode: document.getElementById("stockCode").value.trim(),
        stockName: document.getElementById("stockName").value.trim(),
        updateMode: document.getElementById("updateMode").value,
        pollIntervalSec: document.getElementById("pollIntervalSec").value || "30",
        throttleMs: document.getElementById("throttleMs").value || "1000",
      });
      showStatus("종목 설정이 저장되었습니다", "success");
    }

    document.getElementById("updateMode").addEventListener("change", function () {
      var mode = this.value;
      document.getElementById("pollIntervalRow").style.display = mode === "poll" ? "flex" : "none";
      document.getElementById("throttleMsRow").style.display = mode === "hybrid" ? "flex" : "none";
      saveActionSettings();
    });
    document.getElementById("pollIntervalSec").addEventListener("input", function () {
      validatePollInterval(this.value);
    });
    document.getElementById("pollIntervalSec").addEventListener("change", function () {
      if (validatePollInterval(this.value)) saveActionSettings();
    });
    document.getElementById("throttleMs").addEventListener("input", function () {
      validateThrottleMs(this.value);
    });
    document.getElementById("throttleMs").addEventListener("blur", function () {
      var n = parseInt(this.value, 10);
      if (!isNaN(n) && n < 200) {
        this.value = "200";
        document.getElementById("throttleMsError").style.display = "none";
        saveActionSettings();
      }
    });
    document.getElementById("throttleMs").addEventListener("change", function () {
      if (validateThrottleMs(this.value)) saveActionSettings();
    });

    document.getElementById("stockCode").addEventListener("change", function () {
      if (validateStockCode(this.value)) {
        saveActionSettings();
      }
    });
    document.getElementById("stockName").addEventListener("change", saveActionSettings);

    // ─── 연결 테스트 ───
    document.getElementById("testConnectionBtn").addEventListener("click", function () {
      var btn = document.getElementById("testConnectionBtn");
      var resultEl = document.getElementById("testConnectionResult");
      btn.disabled = true;
      btn.textContent = "테스트 중...";
      resultEl.style.display = "none";

      sendToPlugin({ event: "testConnection" });
    });

    // ─── 연결 테스트 결과 수신 ───
    document.addEventListener("piDidReceiveMessage", function (evt) {
      var payload = evt.detail || {};
      if (payload.event !== "testConnectionResult") return;

      var btn = document.getElementById("testConnectionBtn");
      var resultEl = document.getElementById("testConnectionResult");
      btn.disabled = false;
      btn.textContent = "연결 테스트";

      if (payload.success) {
        showConnectionSuccess(true);
      } else {
        var errorMsg = "연결 실패";
        if (payload.errorType === "AUTH_FAIL") {
          errorMsg = "연결 실패: 인증 오류";
        } else if (payload.errorType === "NETWORK_ERROR") {
          errorMsg = "연결 실패: 네트워크 오류";
        } else if (payload.errorType === "NO_CREDENTIAL") {
          errorMsg = "연결 실패: API 키를 먼저 설정하세요";
        }
        resultEl.textContent = errorMsg;
        resultEl.className = "sdpi-test-result error";
        resultEl.style.display = "block";
        setTimeout(function () { resultEl.style.display = "none"; }, 5000);
      }
    });

    // ─── 상태 메시지 표시 ───
    function showStatus(message, type) {
      var el = document.getElementById("statusMessage");
      el.textContent = message;
      el.className = "sdpi-status " + type;
      el.style.display = "block";
      setTimeout(function () {
        el.style.display = "none";
      }, 2000);
    }
  </script>
</body>
</html>
