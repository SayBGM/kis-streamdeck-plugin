name: Release Stream Deck Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Validate tag and manifest version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -e "console.log(require('./manifest.json').Version)")"

          if [[ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) and manifest version (${MANIFEST_VERSION}) do not match."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, coverage, build, and production audit
        run: npm run verify

      - name: Package and smoke-test the real archive
        run: npm run package:plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin-package
          path: dist/*.streamDeckPlugin
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.streamDeckPlugin
          generate_release_notes: true
