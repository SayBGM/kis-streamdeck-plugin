name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, coverage, build, and production audit
        run: npm run verify

      - name: Package and smoke-test the real archive
        run: npm run package:plugin

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin-package
          path: dist/*.streamDeckPlugin
          if-no-files-found: error
